<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#f4f6f8; padding:20px;">
  <div style="background:#fff; padding:20px; border-radius:8px;">
    <h2 style="color:green;">Credit Alert ✅</h2>

    <p>Hello {{fintechName}},</p>

    <p>You have received <strong>₦{{amount}}</strong>.</p>

    <ul>
      <li><strong>Sender Account:</strong> {{from}}</li>
      <li><strong>Your Account:</strong> {{to}}</li>
      <li><strong>Reference:</strong> {{reference}}</li>
      <li><strong>Current Balance:</strong> ₦{{balance}}</li>
    </ul>

    <p>Thank you for using NibssByPhoenix.</p>
  </div>
</body>
</html>
