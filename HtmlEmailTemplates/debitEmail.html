<!DOCTYPE html>
<html>
<body style="font-family: Arial; background:#f4f6f8; padding:20px;">
  <div style="background:#fff; padding:20px; border-radius:8px;">
    <h2 style="color:red;">Debit Alert 🚨</h2>

    <p>Hello {{fintechName}},</p>

    <p>An amount of <strong>₦{{amount}}</strong> has been debited.</p>

    <ul>
      <li><strong>From Account:</strong> {{from}}</li>
      <li><strong>To Account:</strong> {{to}}</li>
      <li><strong>Reference:</strong> {{reference}}</li>
      <li><strong>Remaining Balance:</strong> ₦{{balance}}</li>
    </ul>

    <p>If this wasn't you, contact support immediately.</p>
  </div>
</body>
</html>
